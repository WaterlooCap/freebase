name: Build and Deploy to DigitalOcean

on:
  push:
    branches: [master]
  workflow_dispatch: # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 3600

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "image=registry.digitalocean.com/waterloocap-base-registry/freebase" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        env:
          IMAGE: ${{ steps.tag.outputs.image }}
          SHA: ${{ steps.tag.outputs.sha }}
        run: |
          docker build \
            --build-arg MB_EDITION=ee \
            --build-arg VERSION="v1.0.0-$SHA" \
            -t "$IMAGE:$SHA" \
            -t "$IMAGE:latest" \
            .

      - name: Push to DOCR
        env:
          IMAGE: ${{ steps.tag.outputs.image }}
          SHA: ${{ steps.tag.outputs.sha }}
        run: |
          docker push "$IMAGE:$SHA"
          docker push "$IMAGE:latest"

      - name: Deploy to DigitalOcean App Platform
        run: doctl apps create-deployment 015ad677-f565-4ef2-bdc1-fe1a0a35522a --wait
